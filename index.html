<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0d1118" id="themeColorMeta">
  <meta name="description" content="Apostila digital e responsiva de Treinamento de Líderes — leitura premium">
  <title>Treinamento de Líderes — Apostila Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,300..900;1,7..72,300..900&family=Source+Serif+4:ital,opsz,wght@0,8..60,200..900;1,8..60,200..900&family=DM+Sans:ital,opsz,wght@0,9..40,300..900;1,9..40,300..900&family=Inter:wght@300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
</head>
<body class="min-h-svh overflow-x-hidden transition-colors duration-300">

<!-- ===== APP SHELL ===== -->
<div id="app" class="flex flex-col min-h-svh">

  <!-- TOPBAR -->
  <header id="topbar" class="topbar">
    <div class="flex items-center gap-1">
      <button id="menuBtn" class="btn-icon" aria-label="Abrir sumário" title="Sumário (M)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="12" x2="16" y2="12"/><line x1="3" y1="17" x2="21" y2="17"/></svg>
      </button>
    </div>

    <div class="brand" id="brand">
      <div class="brand-title" id="currentTitle">Treinamento de Líderes</div>
      <div class="brand-sub" id="currentSub">Capa</div>
    </div>

    <div class="flex items-center gap-1">
      <button id="viewModeBtn" class="btn-pill optional" title="Alternar texto / original">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <span id="viewModeLabel" class="hidden sm:inline text-xs font-semibold">Original</span>
      </button>
      <button id="focusModeBtn" class="btn-icon optional" title="Modo foco (F)" aria-label="Modo foco">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="8" stroke-dasharray="4 2"/></svg>
      </button>
      <button id="settingsBtn" class="btn-icon" aria-label="Configurações" title="Configurações (S)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR TOC (desktop) -->
    <nav id="tocSidebar" class="toc-sidebar" aria-label="Sumário da apostila">
      <div class="sidebar-header">
        <div class="sidebar-logo">TL</div>
        <div>
          <div class="text-xs font-bold text-text leading-tight">Treinamento de Líderes</div>
          <div class="text-[10px] text-muted">Apostila Digital</div>
        </div>
      </div>
      <div class="sidebar-progress-wrap">
        <div class="sidebar-progress-bar">
          <div id="sidebarFill" class="sidebar-progress-fill"></div>
        </div>
        <span id="sidebarLabel" class="text-[10px] text-muted font-semibold tabular-nums">0%</span>
      </div>
      <div id="sidebarBody" class="pt-1 pb-8"></div>
    </nav>

    <!-- READER -->
    <main class="reader" role="main" id="readerArea">
      <div id="pageShell" class="page-shell"></div>
    </main>

  </div>

  <!-- BOTTOM BAR -->
  <nav class="bottombar" id="bottombar" aria-label="Navegação entre páginas">
    <button id="prev" class="nav-btn" aria-label="Página anterior">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="progress-wrap">
      <div class="progress-track">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <span id="progressLabel" class="progress-label"></span>
    </div>
    <button id="next" class="nav-btn" aria-label="Próxima página">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </nav>

</div>

<!-- DRAWER BACKDROP -->
<div id="drawerBackdrop" class="overlay" aria-hidden="true"></div>

<!-- MOBILE DRAWER -->
<aside id="drawer" class="drawer left-drawer" aria-label="Navegação lateral">
  <div class="drawer-head">
    <span class="text-sm font-bold">Conteúdo</span>
    <button id="drawerClose" class="btn-icon" aria-label="Fechar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div id="drawerBody" class="drawer-body"></div>
</aside>

<!-- SETTINGS BACKDROP -->
<div id="settingsBackdrop" class="overlay" aria-hidden="true"></div>

<!-- SETTINGS PANEL -->
<aside id="settingsPanel" class="drawer right-drawer" aria-label="Configurações de leitura">
  <div class="drawer-head">
    <span class="text-sm font-bold">Configurações</span>
    <button id="settingsClose" class="btn-icon" aria-label="Fechar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div id="settingsBody" class="drawer-body p-4 space-y-6"></div>
</aside>

<!-- HIGHLIGHT TOOLTIP -->
<div id="hlTooltip" class="hl-tooltip" role="tooltip" aria-hidden="true">
  <button id="hlApply" class="hl-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 3a4 4 0 0 1 2.83 6.83L8.5 21.66 2 22l.34-6.5L14.67 3.83A4 4 0 0 1 17.5 3z"/></svg>
    Destacar
  </button>
  <div class="w-px bg-white/20 self-stretch"></div>
  <button id="hlCopy" class="hl-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
    Copiar
  </button>
</div>

<!-- TOAST -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
